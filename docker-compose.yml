services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 2"]
      interval: 10s
      timeout: 5s
      retries: 3

  mock-modbus:
    build: ./mock-modbus
    restart: unless-stopped
    environment:
      MOCK_MODBUS_PORT: ${MOCK_MODBUS_PORT:-5020}
      MODBUS_UNIT_ID: ${MODBUS_UNIT_ID:-1}
    ports:
      - "${MOCK_MODBUS_PORT:-5020}:5020"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',5020),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  modbus-poller:
    build: ./modbus-poller
    restart: unless-stopped
    depends_on:
      mock-modbus:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-lab/modbus}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-5}
      REGISTERS_CONFIG: /config/registers.yaml
    volumes:
      - ./modbus-poller/registers.yaml:/config/registers.yaml:ro

  node-red:
    image: nodered/node-red:4.0
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      TZ: Europe/Budapest
    ports:
      - "${NODE_RED_PORT:-1880}:1880"
    volumes:
      - ./node-red/data:/data
